apiVersion: v2
name: monitoring
description: Prometheus + Grafana monitoring stack with Node Exporter, Postgres Exporter, and Traefik metrics
type: application
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  - name: prometheus
    version: "^25.0.0"
    repository: "https://prometheus-community.github.io/helm-charts"
  - name: grafana
    version: "^8.0.0"
    repository: "https://grafana.github.io/helm-charts"
  - name: prometheus-node-exporter
    version: "^4.0.0"
    repository: "https://prometheus-community.github.io/helm-charts"
  - name: prometheus-postgres-exporter
    version: "^6.0.0"
    repository: "https://prometheus-community.github.io/helm-charts"
