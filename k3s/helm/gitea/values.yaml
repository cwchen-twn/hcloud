
certificate:
  name: chenantunez.com
  secretName: chenantunez.com-tls
  clusterIssuer: letsencrypt-prod
  dnsNames:
    - "*.chenantunez.com"

pvc:
  name: gitea-pvc
  size: 10Gi
  storageClass: local-path

# All values under "gitea:" are passed to the upstream gitea sub-chart.
# The nested "gitea.gitea:" block is the sub-chart's own application config section
# (admin, database, server settings, etc.).
gitea:
  # Recreate avoids hostPort 2222 conflict during rolling updates (two pods can't share the same host port)
  strategy:
    type: Recreate

  # Disable bundled PostgreSQL subcharts — use the existing VPS Postgres instance
  postgresql-ha:
    enabled: false

  postgresql:
    enabled: false

  # Use standalone Valkey instead of the default 3-node cluster (overkill for single-node VPS)
  valkey-cluster:
    enabled: false

  valkey:
    enabled: true
    architecture: standalone
    primary:
      persistence:
        enabled: true
        size: 1Gi
        storageClass: local-path

  # Use the PVC created by templates/pvc.yaml — do not let the sub-chart create its own
  persistence:
    create: false
    mount: true
    claimName: gitea-pvc

  service:
    http:
      type: ClusterIP
      port: 3000
    ssh:
      type: ClusterIP
      port: 22
      # Exposes pod port 2222 directly on the host node — matches the Hetzner firewall rule
      hostPort: 2222

  ingress:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: git.chenantunez.com
        paths:
          - path: /
    tls:
      - secretName: chenantunez.com-tls
        hosts:
          - git.chenantunez.com

  gitea:
    admin:
      existingSecret: gitea-secrets
      email: "cwchen@chenantunez.com"
      passwordMode: initialOnlyNoReset

    config:
      database:
        DB_TYPE: postgres
        NAME: gitea
        USER: cwc1222
      server:
        # DOMAIN and SSH_DOMAIN are auto-set from ingress.hosts[0].host
        SSH_PORT: 2222
        SSH_LISTEN_PORT: 2222
      service:
        DISABLE_REGISTRATION: true

    # Inject sensitive DB values from secret using Gitea's env-var config format
    additionalConfigFromEnvs:
      - name: GITEA__DATABASE__HOST
        valueFrom:
          secretKeyRef:
            name: gitea-secrets
            key: DB_HOST
      - name: GITEA__database__PASSWD
        valueFrom:
          secretKeyRef:
            name: gitea-secrets
            key: DB_PASSWORD

    metrics:
      enabled: true

    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "3000"
      prometheus.io/path: "/metrics"
